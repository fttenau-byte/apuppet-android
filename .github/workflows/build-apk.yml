name: Build APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17 (for Android SDK setup)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up JDK 11 (for Gradle build)
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create dummy google-services.json
        run: |
          cat > app/google-services.json << 'GSJSON'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "dummy-project-id",
              "storage_bucket": "dummy-project-id.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000",
                  "android_client_info": {
                    "package_name": "com.hmdm.control"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  {
                    "current_key": "dummy_api_key"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          GSJSON

      - name: Patch WebRTC dependency dan repository
        run: |
          python3 << 'PYEOF'
          # Patch 1: app/build.gradle - ganti WebRTC dependency
          with open("app/build.gradle", "r") as f:
              content = f.read()
          content = content.replace(
              "implementation 'org.webrtc:google-webrtc:1.0.+'",
              "implementation 'io.github.webrtc-sdk:android:125.6422.07'"
          )
          with open("app/build.gradle", "w") as f:
              f.write(content)
          print("app/build.gradle patched OK")

          # Patch 2: build.gradle - tambah maven repo WebRTC
          with open("build.gradle", "r") as f:
              content = f.read()
          content = content.replace(
              "allprojects {\n    repositories {\n        google()\n        jcenter()\n        \n    }\n}",
              "allprojects {\n    repositories {\n        google()\n        jcenter()\n        maven { url 'https://raw.githubusercontent.com/webrtc-sdk/maven/main' }\n    }\n}"
          )
          with open("build.gradle", "w") as f:
              f.write(content)
          print("build.gradle patched OK")
          PYEOF

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apuppet-debug
          path: app/build/outputs/apk/debug/*.apk
          
